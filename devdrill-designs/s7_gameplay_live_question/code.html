<style>
        .pixel-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }
        .pixel-shadow-lg {
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
        }
        .pixel-button {
            transition: all 0.1s;
        }
        .pixel-button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
        }
        .bg-pixel-forest {
            background-color: #19101c;
            background-image:

<!-- Top Navigation Hidden for Gameplay to prioritize focus, per Semantic Shell Mandate -->
<!-- Main Gameplay Canvas -->
<main class="flex-grow flex flex-col items-center justify-center p-md md:p-lg max-w-container-max mx-auto w-full z-10 relative">
<!-- Timer Bar -->
<div class="w-full max-w-2xl mb-xl">
<div class="flex justify-between items-center mb-sm font-label-caps text-label-caps text-secondary-fixed">
<span>TIME REMAINING</span>
<span>00:15</span>
</div>
<div class="w-full h-8 bg-surface-container-low border-2 border-outline-variant rounded pixel-shadow p-1 flex gap-1">
<div class="h-full w-1/12 bg-secondary-container"></div>
<div class="h-full w-1/12 bg-secondary-container"></div>
<div class="h-full w-1/12 bg-secondary-container"></div>
<div class="h-full w-1/12 bg-secondary-container"></div>

<div class="h-full w-1/12 bg-surface"></div>
<div class="h-full w-1/12 bg-surface"></div>
<div class="h-full w-1/12 bg-surface"></div>
</div>
</div>
<!-- Question Card -->

<div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-primary-container to-tertiary-container"></div>
<span class="font-label-caps text-label-caps text-tertiary mb-sm block">QUESTION 4 / 10</span>
<h1 class="font-headline-lg text-headline-lg text-on-surface">What's the fastest animal in the world?</h1>
</div>
<!-- Answers Grid -->
<div class="w-full max-w-3xl grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Answer A -->
<button class="pixel-button bg-surface border-2 border-primary rounded-lg p-md text-left flex items-center gap-md hover:bg-surface-bright pixel-shadow group relative overflow-hidden">
<div class="absolute inset-0 border-2 border-transparent group-hover:border-secondary-fixed transition-colors pointer-events-none"></div>
<div class="w-12 h-12 bg-surface-container-high border-2 border-outline rounded flex items-center justify-center font-headline-md text-headline-md text-primary group-hover:text-secondary-fixed group-hover:border-secondary-fixed shrink-0">
                    A
                </div>
<span class="font-body-lg text-body-lg text-on-surface">Cheetah</span>
</button>
<!-- Answer B -->
<button class="pixel-button bg-surface border-2 border-primary rounded-lg p-md text-left flex items-center gap-md hover:bg-surface-bright pixel-shadow group relative overflow-hidden">
<div class="absolute inset-0 border-2 border-transparent group-hover:border-secondary-fixed transition-colors pointer-events-none"></div>
<div class="w-12 h-12 bg-surface-container-high border-2 border-outline rounded flex items-center justify-center font-headline-md text-headline-md text-primary group-hover:text-secondary-fixed group-hover:border-secondary-fixed shrink-0">
                    B
                </div>
<span class="font-body-lg text-body-lg text-on-surface">Peregrine Falcon</span>
</button>
<!-- Answer C -->

<div class="absolute inset-0 border-2 border-transparent group-hover:border-secondary-fixed transition-colors pointer-events-none"></div>
<div class="w-12 h-12 bg-surface-container-high border-2 border-outline rounded flex items-center justify-center font-headline-md text-headline-md text-primary group-hover:text-secondary-fixed group-hover:border-secondary-fixed shrink-0">
                    C
                </div>
<span class="font-body-lg text-body-lg text-on-surface">Sailfish</span>
</button>
<!-- Answer D -->
<button class="pixel-button bg-surface border-2 border-primary rounded-lg p-md text-left flex items-center gap-md hover:bg-surface-bright pixel-shadow group relative overflow-hidden">
<div class="absolute inset-0 border-2 border-transparent group-hover:border-secondary-fixed transition-colors pointer-events-none"></div>
<div class="w-12 h-12 bg-surface-container-high border-2 border-outline rounded flex items-center justify-center font-headline-md text-headline-md text-primary group-hover:text-secondary-fixed group-hover:border-secondary-fixed shrink-0">
                    D
